<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HN GitHub Trends</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=-apple-system,BlinkMacSystemFont,Segoe+UI,Noto+Sans,Helvetica,Arial,sans-serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <a href="#" class="logo" id="logoBtn">
                    <svg class="logo-ycom" viewBox="0 0 24 24" fill="currentColor"><rect width="24" height="24" rx="2" fill="#ff6600"/><text x="5" y="18" font-size="14" font-weight="bold" fill="white" font-family="monospace">Y</text></svg>
                    <span class="logo-text">HN <span class="logo-accent">GitHub</span> Trends</span>
                </a>
                <div class="header-right">
                    <select id="timeFilter" class="time-select">
                        <option value="1" selected>Last 24h</option>
                        <option value="3">Last 3 days</option>
                        <option value="7">Last 7 days</option>
                    </select>
                    <button id="refreshBtn" class="refresh-btn" title="Refresh">
                        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3l-2-1.5V5h1.5v3.75L10.5 10 9 11z"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <div id="loadingView" class="view">
            <div class="loading-state">
                <div class="loading-pulse"></div>
                <p id="loadingText" class="loading-text">Loading from Hacker News...</p>
                <div class="loading-bar"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
            </div>
        </div>

        <div id="errorView" class="view hidden">
            <div class="error-state">
                <p id="errorText">Something went wrong.</p>
                <button id="retryBtn" class="btn-primary">Retry</button>
            </div>
        </div>

        <div id="mainView" class="view hidden">
            <div class="stats-row">
                <div class="stat-chip"><span class="stat-num" id="statRepos">0</span> repos</div>
                <div class="stat-chip"><span class="stat-num" id="statVotes">0</span> upvotes</div>
                <div class="stat-chip"><span class="stat-num" id="statPosts">0</span> posts</div>
            </div>

            <div class="sort-row">
                <button class="sort-pill active" data-sort="upvotes">🔥 Hot</button>
                <button class="sort-pill" data-sort="stars">⭐ Stars</button>
                <button class="sort-pill" data-sort="recent">🕐 Recent</button>
            </div>

            <div id="repoList" class="repo-list"></div>
        </div>

        <div id="detailView" class="view hidden">
            <div class="detail-back" id="detailBack">
                <svg viewBox="0 0 16 16" fill="currentColor" width="16" height="16"><path d="M7.78 12.53a.75.75 0 01-1.06 0L2.47 8.28a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 1.06L4.81 7h7.44a.75.75 0 010 1.5H4.81l2.97 2.97a.75.75 0 010 1.06z"/></svg>
                Back to Trending
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header-bar">
                <span>Hacker News Discussion</span>
                <button class="modal-close-btn" id="modalCloseBtn">✕</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
